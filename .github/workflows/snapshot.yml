name: Publish Snapshot

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      snapshot-version:
        description: 'Snapshot version (e.g., 0.1.0-SNAPSHOT)'
        required: false
        type: string

permissions:
  contents: read
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      snapshot-version: ${{ steps.snapshot-version.outputs.value }}
      publish-snapshot: ${{ steps.snapshot-version.outputs.publish }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Validate snapshot version
        id: snapshot-version
        run: |
          VERSION="${{ github.event.inputs.snapshot-version }}"
          REQUIRE_SNAPSHOT=false
          SHOULD_PUBLISH_SNAPSHOT=false

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            REQUIRE_SNAPSHOT=true
          fi

          if [ -z "$VERSION" ]; then
            BASE_VERSION="$(grep -E '^(version|VERSION)=' gradle.properties | head -n1 | cut -d'=' -f2)"
            VERSION="$BASE_VERSION"

            if [[ "$REQUIRE_SNAPSHOT" == "true" && ! "$VERSION" =~ -SNAPSHOT$ ]]; then
              VERSION="${VERSION}-SNAPSHOT"
            fi
          fi

          if [[ "$REQUIRE_SNAPSHOT" == "true" && ! "$VERSION" =~ -SNAPSHOT$ ]]; then
            echo "ERROR: Version must end with -SNAPSHOT"
            exit 1
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            SHOULD_PUBLISH_SNAPSHOT=true
          elif [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_NAME}" == "main" && "$VERSION" =~ -SNAPSHOT$ ]]; then
            SHOULD_PUBLISH_SNAPSHOT=true
          fi

          echo "value=$VERSION" >> "$GITHUB_OUTPUT"
          echo "publish=$SHOULD_PUBLISH_SNAPSHOT" >> "$GITHUB_OUTPUT"
          echo "Validated version: $VERSION (publish snapshot: $SHOULD_PUBLISH_SNAPSHOT)"

      - name: Run tests
        env:
          VERSION: ${{ steps.snapshot-version.outputs.value }}
        run: ./gradlew -Pversion="$VERSION" test --no-daemon --stacktrace

  publish-github-packages:
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.publish-snapshot == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Require signing secrets
        run: |
          if [ -z "${{ secrets.SIGNING_GPG_PRIVATE_KEY }}" ]; then
            echo "Missing SIGNING_GPG_PRIVATE_KEY secret"
            exit 1
          fi
          if [ -z "${{ secrets.SIGNING_GPG_KEY_NAME }}" ]; then
            echo "Missing SIGNING_GPG_KEY_NAME secret"
            exit 1
          fi

      - name: Import GPG key
        env:
          SIGNING_GPG_PRIVATE_KEY: ${{ secrets.SIGNING_GPG_PRIVATE_KEY }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
        run: |
          if ! printf '%s' "$SIGNING_GPG_PRIVATE_KEY" | gpg --batch --import; then
            if ! printf '%s' "$SIGNING_GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import; then
              echo "Failed to import SIGNING_GPG_PRIVATE_KEY as armored or base64-encoded key material"
              exit 1
            fi
          fi
          gpg --list-secret-keys --keyid-format=long "$SIGNING_GPG_KEY_NAME"

      - name: Publish to GitHub Packages
        env:
          VERSION: ${{ needs.validate.outputs.snapshot-version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
          SIGNING_GPG_PASSPHRASE: ${{ secrets.SIGNING_GPG_PASSPHRASE }}
        run: |
          SIGNING_ARGS=(-Psigning.gnupg.keyName="$SIGNING_GPG_KEY_NAME")
          if [ -n "${SIGNING_GPG_PASSPHRASE:-}" ]; then
            SIGNING_ARGS+=(-Psigning.gnupg.passphrase="$SIGNING_GPG_PASSPHRASE")
          fi

          ./gradlew -Pversion="$VERSION" publishAllPublicationsToGitHubPackagesRepository "${SIGNING_ARGS[@]}" \
            -Pkonditional.publish.target=github \
            --no-configuration-cache \
            --no-daemon \
            --stacktrace

  publish-maven-central:
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.publish-snapshot == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin
          cache: gradle

      - name: Import GPG key
        env:
          SIGNING_GPG_PRIVATE_KEY: ${{ secrets.SIGNING_GPG_PRIVATE_KEY }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
        run: |
          if ! printf '%s' "$SIGNING_GPG_PRIVATE_KEY" | gpg --batch --import; then
            if ! printf '%s' "$SIGNING_GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import; then
              echo "Failed to import SIGNING_GPG_PRIVATE_KEY as armored or base64-encoded key material"
              exit 1
            fi
          fi
          gpg --list-secret-keys --keyid-format=long "$SIGNING_GPG_KEY_NAME"

      - name: Publish to Maven Central
        env:
          VERSION: ${{ needs.validate.outputs.snapshot-version }}
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALUSERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.ORG_GRADLE_PROJECT_MAVENCENTRALPASSWORD }}
          SIGNING_GPG_KEY_NAME: ${{ secrets.SIGNING_GPG_KEY_NAME }}
          SIGNING_GPG_PASSPHRASE: ${{ secrets.SIGNING_GPG_PASSPHRASE }}
        run: |
          SIGNING_ARGS=(-Psigning.gnupg.keyName="$SIGNING_GPG_KEY_NAME")
          if [ -n "${SIGNING_GPG_PASSPHRASE:-}" ]; then
            SIGNING_ARGS+=(-Psigning.gnupg.passphrase="$SIGNING_GPG_PASSPHRASE")
          fi

          ./gradlew -Pversion="$VERSION" publishToMavenCentral "${SIGNING_ARGS[@]}" \
            -Pkonditional.publish.target=snapshot \
            --no-configuration-cache \
            --no-daemon \
            --stacktrace
